{
    "layer": "top",
    "position": "top",
    "height": 30,
    "spacing": 1,
    "margin": 0,
    "modules-left": ["custom/lbracket", "niri/workspaces", "custom/rbracket"],
    "modules-center": ["clock"],
    "modules-right": ["tray", "custom/lbracket", "pulseaudio", "backlight", "network", "cpu", "memory", "temperature", "battery", "custom/rbracket" ],

    "niri/workspaces": {
        "on-click": "activate",
        "disable-scroll": true,
        "all-outputs": true,
        "format": "{index}",
        "persistent-workspaces": {
            "1": [],
            "2": [],
            "3": [],
            "4": [],
            "5": [],
        },
    },

    "clock": {
        "format": "[ <span text_transform=\"lowercase\">{:%H:%M %A, %b %d}</span> ]",
        "tooltip": false,
    },

    "cpu": {
        "format": "cpu: {usage}%",
        "tooltip": false,
        "interval": 1,
        "on-click": "alacritty -e btop"
    },

    "memory": {
        "format": "ram: {}%",
        "tooltip": false,
        "interval": 1,
        "on-click": "kitty -e htop"
    },

    "temperature": {
        "critical-threshold": 80,
        "format": "tem: {temperatureC}°C",
        "tooltip": false,
        "on-click": "alacritty -e s-tui"
    },

    "battery": {
        "states": {
            "good": 95,
            "warning": 30,
            "critical": 15
        },
        "format": "bat: {capacity}%",
        "tooltip": false,
    },

    "network": {
        "format-wifi": "wif: {signalStrength}%",
        "format-ethernet": "eth: {ifname}",
        "format-disconnected": "wif: {signalStrength}%",
        "on-click": "alacritty -e nmtui",
        "tooltip": false,
    },

    "pulseaudio": {
        "format": "vol: {volume}%",
        "format-muted": "<span strikethrough=\"true\">vol: {volume}%</span>",
        "on-click": "pavucontrol",
        "on-click-right": "pactl set-sink-mute @DEFAULT_SINK@ toggle",
        "on-scroll-up": "pactl set-sink-volume @DEFAULT_SINK@ +2%",
        "on-scroll-down": "pactl set-sink-volume @DEFAULT_SINK@ -2%",
        "tooltip": false,
    },

    "backlight": {
        "format": "bri: {percent}%",
        "on-scroll-up": "brightnessctl set +5%",
        "on-scroll-down": "brightnessctl set 5%-",
        "tooltip": false,
    },

    "tray": {
        "icon-size": 18,
        "spacing": 5,
        "tooltip": false,
    },

    "custom/lbracket": {
        "format": "[",
        "tooltip": false,
    },

    "custom/rbracket": {
        "format": "]",
        "tooltip": false,
    },
}
